name: skillfix
description: "SkillFix - Trade Tutorial App"
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  youtube_player_iframe: ^6.0.2
  shared_preferences: ^2.3.3
  provider: ^6.1.2
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  uuid: ^4.3.3
  flutter_native_splash: ^2.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "img/app_icon.png"
  adaptive_icon_foreground: "img/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  background_image: img/splash_screen.png
  ios: true
  web: false
  android_12:
    background_image: img/splash_screen.png

flutter:
  uses-material-design: true
  generate: true
  assets:
    - img/app_icon.png
    - img/splash_screen.png
